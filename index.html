<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap");

      * {
        font-family: "Open Sans", sans-serif;
      }

      .flex-container {
        box-sizing: border-box;
        width: 100%;
        display: flex;
        flex-direction: row;
        padding: 0;
        margin: 0;
      }

      .version-info {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        align-items: center;
        justify-content: center;
        background-color: #fc912e;
        padding: 0;
        margin: 5px;
        margin-top: 10px;
        border-radius: 10px;
      }
      .version-title {
        text-align: center;
        font-weight: 700;
        font-size: 28px;
        color: #f5f5f5;
        text-shadow: 0px 0px 15px rgba(0, 0, 0, 0.3);
        margin: 5px;
      }
      /* ================================================================== */
      .warning-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #f5f5f5;
        width: 57vw;
        padding: 5px;
        margin: 5px;
        margin-top: 10px;
        border-radius: 10px;
      }
      .warnings-container {
        display: flex;
        flex-direction: row;
      }
      .single-warning-container {
        display: flex;
        flex-direction: column;
        margin: 5px;
        align-items: center;
        padding: 5px;
        box-shadow: 0px 0px 10px #0000001a;
        border-radius: 10px;
        border: 1px solid #888888;
      }
      .warning-title {
        font-weight: 400;
        font-size: 18px;
        padding: 0;
        margin: 5px;
      }
      .warning-data {
        height: 20px;
        width: 20px;
        border-radius: 5px;
        background-color: #ff0000;
      }
      /* ================================================================== */
      .info-container {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        flex-basis: 0;
        align-items: center;
        background-color: #f5f5f5;
        padding: 0;
        margin: 5px;
        margin-top: 10px;
        border-radius: 10px;
      }
      .info-title {
        font-weight: 800;
        font-size: 18px;
      }
      .info {
        font-weight: 800;
        font-size: 18px;
      }
      /* ================================================================== */
      .graph-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #f5f5f5;
        width: 23%;
        flex-grow: 1;
        margin: 5px;
        padding-bottom: 5px;
        padding-right: 10px;
        margin-top: 10px;
        border-radius: 10px;
      }

      .graph-title {
        font-weight: 400;
        font-size: 18px;
        padding: 0;
        margin: 0;
      }

      .graph {
        width: 23vw;
        height: 30vh;
      }

      /* ++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++ */

      body {
        width: 100%;
        height: 100%;
        align-items: center;
        margin: 0 auto;
      }

      ul {
        padding: 0px !important;
      }

      main {
        margin: 0 auto;
        width: 980px;
        position: relative;
      }

      .menu-principal {
        width: 100%;
        background-color: black;
        height: 87px;
        float: left;
        padding: 0px;
      }

      .logo {
        padding: 1px;
        float: left;
        width: 70%;
      }

      .redes-sociais ul li {
        display: inline-block;
        float: left;
        list-style: none;
        margin-left: 15px;
      }

      .redes-sociais {
        width: 25%;
        float: right;
        position: relative;
      }

      .col-100 {
        width: 100%;
        float: left;
        position: relative;
      }

      .tabela1 {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        float: left;
        margin-top: 40px;
      }
    </style>
    <title>Sistema de Gerenciamento de Estacionamento</title>
  </head>
  <body>
    <header class="menu-principal">
      <main>
        <div class="header-1">
          <div class="logo">
            <img src="./img/logo.png" />
          </div>
          <div class="redes-sociais">
            <ul>
              <li>
                <a href="">
                  <img src="./img/tw.png" />
                </a>
              </li>
              <li>
                <a href="">
                  <img src="./img/face.png" />
                </a>
              </li>
              <li>
                <a href="">
                  <img src="./img/linkedin.png" />
                </a>
              </li>
            </ul>
          </div>
        </div>
      </main>
    </header>
    <div class="tabela1">
      <div class="warning-container">
        <h3 class="warning-title">Piso 1</h3>
        <div class="warnings-container">
          <div class="single-warning-container">
            <h3 class="warning-title">V1</h3>
            <div id="V1" class="warning-data"></div>
          </div>
          <div class="single-warning-container">
            <h3 class="warning-title">V2</h3>
            <div id="V2" class="warning-data"></div>
          </div>

          <div class="single-warning-container">
            <h3 class="warning-title">V3</h3>
            <div id="V3" class="warning-data"></div>
          </div>
          <div class="single-warning-container">
            <h3 class="warning-title">V4</h3>
            <div id="V4" class="warning-data"></div>
          </div>
        </div>
        <h3 class="warning-title">Piso 2</h3>
        <div class="warnings-container">
          <div class="single-warning-container">
            <h3 class="warning-title">V5</h3>
            <div id="V5" class="warning-data"></div>
          </div>
          <div class="single-warning-container">
            <h3 class="warning-title">V6</h3>
            <div id="V6" class="warning-data"></div>
          </div>

          <div class="single-warning-container">
            <h3 class="warning-title">V7</h3>
            <div id="V7" class="warning-data"></div>
          </div>
          <div class="single-warning-container">
            <h3 class="warning-title">V8</h3>
            <div id="V8" class="warning-data"></div>
          </div>
        </div>
      </div>
    </div>
    <script>
      const brokerIp = "mqtt.eclipseprojects.io/mqtt";
      const brokerPort = 80;
      const username = "";
      const password = "";
      const fullParkingStateTopic = "0x0000ABCD";
      const updateParkingSpotStateTopic = "0xABCD0000";

      const client = new Paho.MQTT.Client(brokerIp, brokerPort, username);

      const Colors = { red: "#ff0000", green: "#00ca00" };

      const spotIdList = ["V1", "V2", "V3", "V4", "V5", "V6", "V7", "V8"];

      window.onload = () => {
        spotList = spotIdList.reduce((accumulator, currentId) => {
          accumulator[currentId] = document.getElementById(currentId);
          return accumulator;
        }, {});
      };

      client.connect({
        onSuccess: () => {
          console.log("MQTT Connected Succesfully");
          client.subscribe(fullParkingStateTopic);
          client.subscribe(updateParkingSpotStateTopic);
        },
      });

      client.onConnectionLost = (responseObject) => {
        if (responseObject.errorCode !== 0) {
          console.log("onConnectionLost:" + responseObject.errorMessage);
        }
      };

      client.onMessageArrived = (message) => {
        const topic = message.destinationName;
        const data = message.payloadString.split(";");
        console.log(topic, data);
        const { V1, V2, V3, V4, V5, V6, V7, V8 } = spotList;
        const { red, green } = Colors;

        if (topic == fullParkingStateTopic) {
          client.unsubscribe(fullParkingStateTopic);
          V1.style.backgroundColor = data[1] == "1" ? red : green;
          V2.style.backgroundColor = data[2] == "1" ? red : green;
          V3.style.backgroundColor = data[3] == "1" ? red : green;
          V4.style.backgroundColor = data[4] == "1" ? red : green;
          V5.style.backgroundColor = data[5] == "1" ? red : green;
          V6.style.backgroundColor = data[6] == "1" ? red : green;
          V7.style.backgroundColor = data[7] == "1" ? red : green;
          V8.style.backgroundColor = data[8] == "1" ? red : green;
        } else {
          switch (data[0]) {
            case "1":
              V1.style.backgroundColor = data[1] == "1" ? red : green;
              break;
            case "2":
              V2.style.backgroundColor = data[1] == "1" ? red : green;
              break;
            case "3":
              V3.style.backgroundColor = data[1] == "1" ? red : green;
              break;
            case "4":
              V4.style.backgroundColor = data[1] == "1" ? red : green;
              break;
            case "5":
              V5.style.backgroundColor = data[1] == "1" ? red : green;
              break;
            case "6":
              V6.style.backgroundColor = data[1] == "1" ? red : green;
              break;
            case "7":
              V7.style.backgroundColor = data[1] == "1" ? red : green;
              break;
            case "8":
              V8.style.backgroundColor = data[1] == "1" ? red : green;
              break;
            default:
              break;
          }
        }
      };
    </script>
  </body>
</html>
